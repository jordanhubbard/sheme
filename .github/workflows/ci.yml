name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y zsh

      - name: Check bash version
        run: bash --version | head -1

      - name: Check zsh version
        run: zsh --version

      - name: Syntax check (bash)
        run: bash -n bs.sh

      - name: Syntax check (zsh)
        run: zsh -n bs.zsh

  test-bash:
    name: Bash tests
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y bats expect

      - name: Run bash test suite
        run: bats tests/bs.bats

      - name: Run editor expect tests
        run: bash tests/run_em_tests.sh

      - name: Run R5RS compatibility tests
        run: bash tests/r5rs-tests.sh

      - name: Smoke-test interpreter (bash)
        run: |
          source bs.sh
          bs-reset
          bs '(define x 1)'
          bs '(set! x (+ x 41))'
          echo "x=$x"
          [[ "$x" == "i:42" ]] && echo "PASS: x == i:42" || { echo "FAIL"; exit 1; }
          bs '(define (fact n) (if (= n 0) 1 (* n (fact (- n 1)))))'
          bs '(fact 10)'
          [[ "$__bs_last" == "i:3628800" ]] && echo "PASS: fact(10) == i:3628800" || { echo "FAIL"; exit 1; }

  test-zsh:
    name: Zsh tests
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y zsh

      - name: Run zsh test suite
        run: zsh tests/bs-zsh.zsh

      - name: Smoke-test interpreter (zsh)
        run: |
          zsh -c '
            source bs.zsh
            bs-reset
            eval "$(bs "(define x 1)")"
            eval "$(bs "(set! x (+ x 41))")"
            echo "x=$x"
            [[ "$x" == "i:42" ]] && echo "PASS: x == i:42" || { echo "FAIL"; exit 1; }
            eval "$(bs "(define (fact n) (if (= n 0) 1 (* n (fact (- n 1)))))")"
            eval "$(bs "(fact 10)")"
            [[ "$__bs_last" == "i:3628800" ]] && echo "PASS: fact(10) == i:3628800" || { echo "FAIL"; exit 1; }
          '
